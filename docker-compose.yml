name: ragnosis

networks:
  ragnosis_net:
    driver: bridge

volumes:
  chroma_data:
  processed_data:

services:

  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ragnosis_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ingest:
    profiles: [ingest]
    build:
      context: .
      dockerfile: docker/Dockerfile.ingest
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    volumes:
      - ./data/raw:/app/data/raw:ro
      - processed_data:/app/data/processed
    networks:
      - ragnosis_net
    depends_on:
      chromadb:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
    ports:
      - "8000:8000"
    volumes:
      - processed_data:/app/data/processed:ro
    networks:
      - ragnosis_net
    depends_on:
      chromadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 20s

  ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
      target: runtime
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    command: ["streamlit", "run", "ui/app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    networks:
      - ragnosis_net
    depends_on:
      api:
        condition: service_healthy
